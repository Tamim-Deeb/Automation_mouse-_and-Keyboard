name: Build Windows Portable App

on:
  push:
    branches: [main]
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build Windows Executable
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install only production dependencies (exclude pytest)
          pip install pyautogui openpyxl pynput pyinstaller pyinstaller-hooks-contrib
      
      - name: Run PyInstaller
        run: |
          python -m PyInstaller build/AutomationBuilder.spec
      
      - name: Verify build output
        run: |
          if (Test-Path "dist/AutomationBuilder/AutomationBuilder.exe") {
            Write-Host "✓ Executable found"
            $size = (Get-ChildItem -Path "dist/AutomationBuilder" -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB
            Write-Host "✓ Folder size: $([math]::Round($size, 2)) MB"
            if ($size -gt 150) {
              Write-Host "⚠ WARNING: Folder size exceeds 150 MB"
            }
          } else {
            Write-Host "✗ ERROR: Executable not found"
            exit 1
          }
      
      - name: Create zip archive
        run: |
          cd dist
          Compress-Archive -Path AutomationBuilder -DestinationPath AutomationBuilder-windows.zip
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutomationBuilder-windows
          path: dist/AutomationBuilder-windows.zip
          retention-days: 30
  
  release:
    name: Create GitHub Release
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: AutomationBuilder-windows
          path: .
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: AutomationBuilder-windows.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

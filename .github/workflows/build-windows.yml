name: Build Windows App

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Create icon (if missing)
        run: |
          if (!(Test-Path "assets/app.ico")) {
            pip install Pillow
            python create_icon.py
          } else {
            Write-Output "Icon already exists, skipping"
          }

      - name: Build portable app
        run: python build.py

      - name: Zip the app folder
        run: Compress-Archive -Path dist/AutomationMouseKeyboard/* -DestinationPath AutomationMouseKeyboard-Windows.zip

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Automation Mouse & Keyboard (Latest Build)
          body: |
            Download **AutomationMouseKeyboard-Windows.zip**, extract it, and double-click **AutomationMouseKeyboard.exe** to run.

            No installation needed. Windows 10 or later required.

            If Windows shows a "Windows protected your PC" warning, click **More info** then **Run anyway**.
          files: AutomationMouseKeyboard-Windows.zip
          make_latest: true

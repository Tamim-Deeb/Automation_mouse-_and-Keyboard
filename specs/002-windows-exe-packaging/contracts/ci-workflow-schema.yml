# GitHub Actions CI Workflow Contract
# Defines the expected structure of the build workflow

name: Build Windows Portable App

triggers:
  push:
    branches: [main]
  push_tags:
    pattern: "v*.*.*"

jobs:
  build:
    runner: windows-latest
    python_version: "3.12"
    steps:
      - checkout_code
      - setup_python
      - install_dependencies  # requirements.txt + pyinstaller
      - run_build             # pyinstaller build/AutomationBuilder.spec (--onedir)
      - zip_output            # Compress dist/AutomationBuilder/ to .zip
      - upload_artifact       # Upload AutomationBuilder-windows.zip

  release:
    condition: tag_push_only  # Only on v*.*.* tags
    depends_on: build
    steps:
      - download_artifact
      - create_github_release
      - attach_zip_to_release

artifacts:
  name: AutomationBuilder-windows
  path: dist/AutomationBuilder-windows.zip
  retention_days: 30
